services:
  - type: web
    name: bangmio-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: OAUTH_REDIRECT_URI
        value: https://sparkmio.github.io/Bangmio/login/callback