name = "bangmio"
compatibility_date = "2025-05-31"
pages_build_output_dir = "client/dist"

[build]
command = "npm install && npm install --prefix client && npm run build --prefix client"

[build.environment]
NODE_VERSION = "18"

[vars]
OAUTH_REDIRECT_URI = "https://bangmio.pages.dev/login/callback"
